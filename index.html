<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartProcure — ปะการังซัพพลาย</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- LOGIN PAGE -->
<div id="page-login" class="page">
  <div class="login-bg">
    <div class="login-card">
      <div class="login-logo">
        <div class="sp-icon">SP</div>
        <h1>SmartProcure</h1>
        <p>ระบบวางแผนจัดซื้อ ปะการังซัพพลาย</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-user" placeholder="กรอก username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="login-pass" placeholder="กรอก password" autocomplete="current-password" />
            <button type="button" id="toggle-pw" class="btn-icon">👁</button>
          </div>
        </div>
        <div id="login-error" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn-primary full" id="login-btn">เข้าสู่ระบบ</button>
      </form>
      <p class="login-hint">ลูกค้า: hotela / password &nbsp;|&nbsp; แอดมิน: pakarang / password</p>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="page-app" class="page" style="display:none">

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <div class="nav-brand">
        <div class="sp-icon sm">SP</div>
        <div>
          <span class="brand-name">SmartProcure</span>
          <span class="brand-sub">ปะการังซัพพลาย</span>
        </div>
      </div>
      <div class="nav-links" id="nav-links">
        <!-- Customer Links -->
        <a href="#" class="nav-link cust-link" data-page="daily-plans">แผนรายวัน</a>
        <a href="#" class="nav-link cust-link" data-page="batch-order">Batch Order</a>
        <a href="#" class="nav-link cust-link" data-page="menus">เมนูอาหาร</a>
        <a href="#" class="nav-link cust-link" data-page="order-history">ประวัติสั่งซื้อ</a>
        <a href="#" class="nav-link cust-link" data-page="profile">โปรไฟล์</a>
        <!-- Admin Links -->
        <a href="#" class="nav-link admin-link" data-page="admin-orders" style="display:none">ออเดอร์ทั้งหมด</a>
        <a href="#" class="nav-link admin-link" data-page="admin-dashboard" style="display:none">สรุปวัตถุดิบ</a>
      </div>
      <div class="nav-right">
        <span id="nav-username" class="nav-user"></span>
        <button id="logout-btn" class="btn-logout">ออกจากระบบ</button>
        <button id="mobile-menu-btn" class="btn-icon mobile-only" style="font-size:18px;line-height:1">&#9776;</button>
      </div>
    </div>
    <div id="mobile-nav" class="mobile-nav" style="display:none"></div>
  </nav>

  <!-- Pages Container -->
  <div id="content">
    <div id="subpage-calculator" class="subpage"></div>
    <div id="subpage-daily-plans" class="subpage" style="display:none"></div>
    <div id="subpage-batch-order" class="subpage" style="display:none"></div>
    <div id="subpage-menus" class="subpage" style="display:none"></div>
    <div id="subpage-order-history" class="subpage" style="display:none"></div>
    <div id="subpage-profile" class="subpage" style="display:none"></div>
    <div id="subpage-admin-orders" class="subpage" style="display:none"></div>
    <div id="subpage-admin-dashboard" class="subpage" style="display:none"></div>
    <div id="subpage-menu-select" class="subpage" style="display:none"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="data/ingredients.js"></script>
<script src="data/default-menus.js"></script>
<script src="data/mock-orders.js"></script>
<script src="js/db.js"></script>
<script src="js/calc.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/ai.js"></script>
<script src="pages/calculator.js"></script>
<script src="pages/daily-plans.js"></script>
<script src="pages/batch-order.js"></script>
<script src="pages/menus.js"></script>
<script src="pages/menu-select.js"></script>
<script src="pages/order-history.js"></script>
<script src="pages/profile.js"></script>
<script src="pages/admin-orders.js"></script>
<script src="pages/admin-dashboard.js"></script>
<script src="js/app.js"></script>
</body>
</html>
