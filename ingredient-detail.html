<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartProcure — แก้ไขวัตถุดิบ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style-dashboard.css" />
</head>
<body>

  <header class="navbar">
    <div class="navbar-brand">
      <div class="nav-logo">SP</div>
      <div>
        <span class="nav-title">SmartProcure</span>
        <span class="nav-tag">Hotel Food Order Calculator</span>
      </div>
    </div>
    <div class="navbar-right">
      <button id="lang-btn" onclick="toggleLang()" class="lang-btn">EN</button>
      <button onclick="handleLogout()" class="btn-ghost">ออกจากระบบ →</button>
    </div>
  </header>

  <main class="main-wrap">
    <div class="page-hd" style="display:flex;align-items:center;gap:1rem">
      <button onclick="goBack()" class="btn-back">← กลับ</button>
      <div>
        <h1 class="page-title" id="detail-title">แก้ไขวัตถุดิบ</h1>
        <p class="page-sub" id="detail-cat"></p>
      </div>
    </div>

    <div id="not-found" class="card hidden" style="padding:2rem;text-align:center;color:#6B7280">
      ไม่พบวัตถุดิบนี้
    </div>

    <div id="detail-form">
      <!-- General Info -->
      <section class="card" style="margin-bottom:1rem">
        <h2 class="card-title">ข้อมูลทั่วไป</h2>
        <div class="input-grid">
          <div class="field-group">
            <label class="field-label">ชื่อวัตถุดิบ</label>
            <input id="d-name" type="text" class="field-input" />
          </div>
          <div class="field-group">
            <label class="field-label">หมวดหมู่</label>
            <select id="d-cat" class="field-input">
              <option value="ชิ้นส่วนหมู">ชิ้นส่วนหมู</option>
              <option value="หมูแปรรูป">หมูแปรรูป</option>
              <option value="หมูกระทะ/ชาบู">หมูกระทะ/ชาบู</option>
              <option value="ไก่/แปรรูป">ไก่/แปรรูป</option>
              <option value="ชิ้นส่วนวัว">ชิ้นส่วนวัว</option>
              <option value="วัว/แปรรูป">วัว/แปรรูป</option>
              <option value="เป็ด/แปรรูป">เป็ด/แปรรูป</option>
              <option value="กุ้ง">กุ้ง</option>
              <option value="หมึก">หมึก</option>
              <option value="ปู">ปู</option>
              <option value="ลูกชิ้น/ไส้กรอก & ของทานเล่น">ลูกชิ้น/ไส้กรอก & ของทานเล่น</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">ราคา / กก. (฿)</label>
            <input id="d-price" type="number" min="0" class="field-input" />
          </div>
        </div>
      </section>

      <!-- Grams per Meal -->
      <section class="card" style="margin-bottom:1rem">
        <h2 class="card-title">กรัม / คน แยกมื้อ</h2>
        <div class="input-grid">
          <div class="field-group">
            <label class="field-label">🌅 เช้า (Breakfast)</label>
            <input id="d-g-breakfast" type="number" min="0" class="field-input" />
          </div>
          <div class="field-group">
            <label class="field-label">☀️ กลางวัน (Lunch)</label>
            <input id="d-g-lunch" type="number" min="0" class="field-input" />
          </div>
          <div class="field-group">
            <label class="field-label">🌙 เย็น (Dinner)</label>
            <input id="d-g-dinner" type="number" min="0" class="field-input" />
          </div>
        </div>
      </section>

      <!-- Calculated Preview -->
      <section class="card" style="margin-bottom:1rem">
        <h2 class="card-title">ตัวอย่างการคำนวณ (80 ห้อง × 75% × 1.8 คน/ห้อง × Buffer 5%)</h2>
        <div class="cards-grid" id="detail-calc"></div>
      </section>

      <!-- Actions -->
      <section class="card">
        <div style="display:flex;gap:.75rem;flex-wrap:wrap">
          <button onclick="saveDetail()" class="btn-cta" style="flex:1;min-width:140px">💾 บันทึก</button>
          <button onclick="deleteDetail()" class="btn-delete" style="flex:1;min-width:140px">🗑 ลบวัตถุดิบ</button>
        </div>
      </section>
    </div>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ingredient-detail.js"></script>
</body>
</html>
